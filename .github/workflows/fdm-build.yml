name: Deploy FDMVUE (web-antd)

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: prod
        type: choice
        options:
          - dev
          - test
          - prod

permissions:
  contents: write

concurrency:
  group: fdm-build-${{ github.ref_name }}-${{ github.event.inputs.environment || 'prod' }}
  cancel-in-progress: true

env:
  TZ: Asia/Shanghai
  APP_NAME: ${{ vars.APP_NAME || 'fdmvue' }}
  DEPLOY_ENV: ${{ github.event.inputs.environment || 'prod' }}
  FRONTEND_APP: web-antd
  FRONTEND_DIST: apps/web-antd/dist

  # Build-time Vue settings. Keep the API URL relative so the browser goes
  # through Nginx in production instead of calling 127.0.0.1:48080 directly.
  FRONTEND_BASE_URL: ${{ vars.FRONTEND_BASE_URL || '' }}
  FRONTEND_API_URL: ${{ vars.FRONTEND_API_URL || '/admin-api' }}

jobs:
  build:
    name: Build web-antd
    runs-on: ubuntu-latest
    timeout-minutes: 30
    outputs:
      package_name: ${{ steps.package.outputs.package_name }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Setup Node and pnpm
        uses: ./.github/actions/setup-node

      - name: Override production env for CI
        run: |
          set -euo pipefail
          # .env.production.local overrides .env.production at build time
          # without committing server-specific values to the repo.
          cat > "apps/${FRONTEND_APP}/.env.production.local" <<EOF
          VITE_BASE=/
          VITE_BASE_URL=${FRONTEND_BASE_URL}
          VITE_GLOB_API_URL=${FRONTEND_API_URL}
          VITE_UPLOAD_TYPE=server
          VITE_COMPRESS=gzip
          VITE_PWA=false
          EOF
          sed -i 's/^          //' "apps/${FRONTEND_APP}/.env.production.local"
          cat "apps/${FRONTEND_APP}/.env.production.local"

      - name: Build dist
        env:
          NODE_OPTIONS: --max-old-space-size=8192
        run: pnpm run build:antd

      - name: Package release
        id: package
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          package_name="${APP_NAME}-${DEPLOY_ENV}-${short_sha}.tar.gz"

          rm -rf release
          mkdir -p release/frontend
          cp -a "${FRONTEND_DIST}/." release/frontend/

          test -s release/frontend/index.html

          tar -czf "${package_name}" -C release .
          sha256sum "${package_name}" > "${package_name}.sha256"

          echo "package_name=${package_name}" >> "${GITHUB_OUTPUT}"
          ls -lh "${package_name}" "${package_name}.sha256"

      - name: Upload release package
        uses: actions/upload-artifact@v7
        with:
          name: release-package
          path: |
            ${{ steps.package.outputs.package_name }}
            ${{ steps.package.outputs.package_name }}.sha256
          if-no-files-found: error
          retention-days: 14

  publish_oss:
    name: Upload to Aliyun OSS
    runs-on: ubuntu-latest
    needs: build
    # 与 FDMServer 共用同一个 bucket，但用不同的 OSS_PREFIX（如 fdmvue-yyyyyyyy）。
    # 需要在 FDMVUE 仓库 Settings → Secrets and variables → Actions 配置：
    #   OSS_ENDPOINT          oss-cn-hangzhou.aliyuncs.com  （和后端同一个）
    #   OSS_BUCKET            和后端同一个 bucket
    #   OSS_PREFIX            前端专用前缀，例 fdmvue-yyyyyyyyyyyyyyyyyyyy
    #   OSS_ACCESS_KEY_ID     可与 FDMServer 用同一对 RAM 凭证（需 RAM 策略覆盖两个 prefix）
    #   OSS_ACCESS_KEY_SECRET
    if: ${{ github.event_name == 'push' }}
    timeout-minutes: 10

    steps:
      - name: Download release package
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: dist

      - name: Install ossutil
        run: |
          set -euo pipefail
          curl -fLo ossutil https://gosspublic.alicdn.com/ossutil/1.7.18/ossutil64
          chmod +x ossutil
          sudo mv ossutil /usr/local/bin/ossutil

      - name: Configure ossutil
        env:
          OSS_ENDPOINT: ${{ secrets.OSS_ENDPOINT }}
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          set -euo pipefail
          : "${OSS_ENDPOINT:?Missing OSS_ENDPOINT secret}"
          : "${OSS_ACCESS_KEY_ID:?Missing OSS_ACCESS_KEY_ID secret}"
          : "${OSS_ACCESS_KEY_SECRET:?Missing OSS_ACCESS_KEY_SECRET secret}"
          ossutil config -e "${OSS_ENDPOINT}" -i "${OSS_ACCESS_KEY_ID}" -k "${OSS_ACCESS_KEY_SECRET}"

      - name: Upload package + checksum + latest pointer
        env:
          OSS_BUCKET: ${{ secrets.OSS_BUCKET }}
          OSS_PREFIX: ${{ secrets.OSS_PREFIX }}
          PACKAGE_NAME: ${{ needs.build.outputs.package_name }}
        run: |
          set -euo pipefail
          : "${OSS_BUCKET:?Missing OSS_BUCKET secret}"
          : "${OSS_PREFIX:?Missing OSS_PREFIX secret}"

          short_sha="${GITHUB_SHA::12}"
          tag="build-${short_sha}"
          base="oss://${OSS_BUCKET}/${OSS_PREFIX%/}"

          ossutil cp -f "dist/${PACKAGE_NAME}"        "${base}/${tag}/${PACKAGE_NAME}"
          ossutil cp -f "dist/${PACKAGE_NAME}.sha256" "${base}/${tag}/${PACKAGE_NAME}.sha256"

          echo "${tag}" > latest.txt
          ossutil cp -f latest.txt "${base}/latest.txt"

          echo "Uploaded ${tag} to ${base}/${tag}/"
          echo "latest.txt -> ${tag}"

  release:
    name: Publish GitHub Release (audit / archive)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.event_name == 'push' }}
    timeout-minutes: 10

    steps:
      - name: Download release package
        uses: actions/download-artifact@v8
        with:
          name: release-package
          path: dist

      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PACKAGE_NAME: ${{ needs.build.outputs.package_name }}
        run: |
          set -euo pipefail
          short_sha="${GITHUB_SHA::12}"
          tag="build-${short_sha}"

          if gh release view "${tag}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "Release ${tag} already exists; uploading assets with --clobber"
            gh release upload "${tag}" \
              "dist/${PACKAGE_NAME}" \
              "dist/${PACKAGE_NAME}.sha256" \
              --repo "${GITHUB_REPOSITORY}" \
              --clobber
          else
            gh release create "${tag}" \
              "dist/${PACKAGE_NAME}" \
              "dist/${PACKAGE_NAME}.sha256" \
              --repo "${GITHUB_REPOSITORY}" \
              --target "${GITHUB_SHA}" \
              --title "Build ${short_sha}" \
              --notes "Automated frontend build from commit ${GITHUB_SHA}." \
              --prerelease
          fi

          echo "Published release tag: ${tag}"
